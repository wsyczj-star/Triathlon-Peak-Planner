        const MY_STRAVA_CLIENT_ID = '225927'; 

        // --- 内联 SVG 图标集合 ---

        const IconSettings = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;

        const IconAlert = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
        const IconCheck = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const IconTrending = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>;
        const IconWaves = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"></path><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"></path><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"></path></svg>;
        const IconBike = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="5.5" cy="17.5" r="3.5"></circle><circle cx="18.5" cy="17.5" r="3.5"></circle><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"></path></svg>;
        const IconRun = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 10v-2a2 2 0 1 1 4 0v2"></path><path d="M14 10L10 14"></path><path d="M10 14h4"></path><path d="M14 14l-4 4"></path><path d="M10 18h4"></path></svg>;
        const IconX = ({className="w-4 h-4"}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const IconLoader = ({className="w-4 h-4"}) => <svg className={`${className} animate-spin`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;

        // --- 数据字典 ---
        const PREDEFINED_RACES = [
            { name: "IRONMAN 70.3 上海崇明站 (万达体育)", estDate: "2026-05-25" },
            { name: "Challenge Taiwan 国际铁人三项赛·台东", estDate: "2026-04-26" },
            { name: "江西德兴铁人三项亚洲杯赛 (中铁协)", estDate: "2026-04-20" },
            { name: "长三角国际铁人三项赛·上海青浦 (中铁协)", estDate: "2026-05-18" },
            { name: "威海超级铁人三项系列赛 (中铁协)", estDate: "2026-09-20" },
            { name: "广州铁人三项赛 (中铁协)", estDate: "2026-10-19" },
            { name: "无锡铁人三项赛暨中国铁人三项联赛", estDate: "2026-10-26" },
            { name: "常熟尚湖 STC 铁人三项赛 (STC大铁)", estDate: "2026-06-15" },
            { name: "安徽广德铁立方(IronCube)超级铁三赛", estDate: "2026-09-20" },
            { name: "京津冀三夫铁人三项赛·北京金海湖", estDate: "2026-09-20" },
            { name: "阳朔铁人三项赛 (地方经典赛)", estDate: "2026-10-25" },
            { name: "其他自定义赛事...", estDate: "" }
        ];

        const AGE_GROUPS = ["U19 (19岁以下)", "20-24", "25-29", "30-34", "35-39", "40-44", "45-49", "50-54", "55-59", "60-64", "65-69", "70+ (70岁以上)"];
        const DISTANCES = ["大铁 (226km)", "半程大铁/70.3 (113km)", "奥运标准距离 (51.5km)", "半程标铁/冲刺 (25.75km)"];
        const MOCK_WEEKLY_TRENDS = [{ week: '5周前', planned: 8, actual: 8.5 }, { week: '4周前', planned: 9, actual: 7.5 }, { week: '3周前', planned: 10, actual: 10 }, { week: '2周前', planned: 11, actual: 9 }, { week: '上周', planned: 12, actual: 12.5 }, { week: '本周', planned: 13, actual: 11 }];

        // --- 辅助计算与格式化 ---
        const formatTime = (mins) => {
            const mNum = Number(mins);
            if (!mNum) return '0m';
            const h = Math.floor(mNum / 60);
            const m = mNum % 60;
            return h > 0 ? `${h}h ${m}m` : `${m}m`;
        };

        const getTrainingPhaseAdvice = (daysLeft) => {
            if (daysLeft < 0) return { id: "recovery", phase: "赛后恢复期 (Recovery)", color: "bg-zinc-100 text-zinc-700 border-zinc-200", desc: "比赛已结束，恭喜完赛！", focus: "彻底放松，进行轻度交叉训练，排酸恢复，为下一赛段蓄力。" };
            if (daysLeft <= 7) return { id: "race", phase: "比赛周 (Race Week)", color: "bg-purple-100 text-purple-800 border-purple-200", desc: "状态激活，充足睡眠，准备开赛！", focus: "训练量降至极低（平时20%）。赛前3天安排短时间激活。重点关注饮食碳水储备与装备整理。" };
            if (daysLeft <= 21) return { id: "taper", phase: "赛前减量期 (Taper Phase)", color: "bg-emerald-100 text-emerald-800 border-emerald-200", desc: "削减容量，消除疲劳，保持强度刺激。", focus: "切忌突击补量！周容量砍半，保留短时间、比赛配速的间歇训练，让身体在比赛日超量恢复。" };
            if (daysLeft <= 56) return { id: "build", phase: "赛前冲刺强化期 (Peak/Build)", color: "bg-rose-100 text-rose-800 border-rose-200", desc: "训练容量与强度双高，专项能力的试金石。", focus: "每周安排1次“砖块训练(Brick)”适应换项。增加乳酸阈值（Z4）训练比例，拉长周末LSD距离。" };
            return { id: "base", phase: "基础建设期 (Base Phase)", color: "bg-cyan-100 text-cyan-800 border-cyan-200", desc: "构建强大的有氧引擎与肌肉耐力。", focus: "忘记配速！80%的训练应在低心率（Z2 二区）轻松完成。注重技术改良，夯实有氧基础。" };
        };

        const generateWeeklyPlan = (phaseId, goalDistance) => {
            const isFull = goalDistance.includes('226');
            const isHalf = goalDistance.includes('113');
            const mult = isFull ? 2 : (isHalf ? 1.5 : 1);
            const styles = { rest: "bg-zinc-50 text-zinc-500 border-zinc-200", swim: "bg-cyan-50 text-cyan-700 border-cyan-200", bike: "bg-emerald-50 text-emerald-700 border-emerald-200", run:  "bg-orange-50 text-[#FC4C02] border-orange-200", brick: "bg-purple-50 text-purple-700 border-purple-200", race: "bg-rose-500 text-white border-rose-600" };

            if (phaseId === 'recovery') return [
                { day: '周一', tag: '🛏️ 彻底休息', style: styles.rest, text: '睡眠与被动恢复，精油按摩。' }, { day: '周二', tag: '🚶 积极恢复', style: styles.rest, text: '散步或超慢骑行 20分，排酸。' },
                { day: '周三', tag: '🏊 放松游', style: styles.swim, text: '1000m 极慢速打腿恢复。' }, { day: '周四', tag: '🛏️ 休息', style: styles.rest, text: '拉伸与泡沫轴放松。' },
                { day: '周五', tag: '🏃 慢跑恢复', style: styles.run, text: 'Z1区超慢跑 20分钟。' }, { day: '周六', tag: '🚴 休闲骑', style: styles.bike, text: '不看功率的咖啡休闲骑。' }, { day: '周日', tag: '🛏️ 交叉', style: styles.rest, text: '无压力交叉运动。' }
            ];
            if (phaseId === 'race') return [
                { day: '周一', tag: '🛏️ 彻底休息', style: styles.rest, text: '储备体能，增加碳水比例。' }, { day: '周二', tag: '🏊 赛前水感', style: styles.swim, text: `轻松游 ${isFull?'1500':'800'}m，含少许冲刺。` },
                { day: '周三', tag: '🚴 踏频唤醒', style: styles.bike, text: `轻松骑 ${Math.round(40*mult)}m，含3组赛道功率。` }, { day: '周四', tag: '🏃 神经激活', style: styles.run, text: `轻松跑 20m，含快步频冲刺。` },
                { day: '周五', tag: '🛏️ 彻底休息', style: styles.rest, text: '领参赛包，理装备，早睡。' }, { day: '周六', tag: '🔥 赛前一天', style: styles.brick, text: '交车。15分极轻骑+10分慢跑。' }, { day: '周日', tag: '🏆 比赛日', style: styles.race, text: '检验成果！按既定心率稳扎稳打！' }
            ];
            if (phaseId === 'taper') return [
                { day: '周一', tag: '🛏️ 休息/拉伸', style: styles.rest, text: '全天休息，重点放松腿部。' }, { day: '周二', tag: '🏊 强度维持', style: styles.swim, text: `总容量减半。包含赛道配速。` },
                { day: '周三', tag: '🚴 节奏激活', style: styles.bike, text: `骑行 ${Math.round(1*mult)}h。含短时比赛功率巡航。` }, { day: '周四', tag: '🏃 配速记忆', style: styles.run, text: `跑 ${Math.round(40*mult)}m。含2组目标配速。` },
                { day: '周五', tag: '🛏️ 休息', style: styles.rest, text: '完全恢复，消除本周疲劳。' }, { day: '周六', tag: '🚴 短途适应', style: styles.bike, text: `周末减量骑行 ${Math.round(1.5*mult)}h。` }, { day: '周日', tag: '🏃 轻松长跑', style: styles.run, text: `周末减量长跑 ${Math.round(50*mult)}m。` }
            ];
            if (phaseId === 'build') return [
                { day: '周一', tag: '🛏️ 休息日', style: styles.rest, text: '彻底休息，消化周末高压疲劳。' }, { day: '周二', tag: '🏊 阈值游泳', style: styles.swim, text: `容量 ${Math.round(2.5*mult)}k。做无氧阈值间歇。` },
                { day: '周三', tag: '🚴 甜点/间歇', style: styles.bike, text: `骑行 ${Math.round(1.2*mult)}h。安排SweetSpot间歇。` }, { day: '周四', tag: '🏃 节奏跑', style: styles.run, text: `跑步 ${Math.round(50*mult)}m。含目标配速巡航。` },
                { day: '周五', tag: '🏊 轻松游', style: styles.swim, text: `恢复游 ${Math.round(2*mult)}k。注重划水技术。` }, { day: '周六', tag: '🔥 砖块训练', style: styles.brick, text: `长骑 ${Math.round(2.5*mult)}h后紧接快跑 ${Math.round(20*mult)}m。` }, { day: '周日', tag: '🏃 周末长跑', style: styles.run, text: `LSD 慢跑 ${Math.round(1.5*mult)}h。后半程提速。` }
            ];
            return [
                { day: '周一', tag: '🛏️ 休息/拉伸', style: styles.rest, text: '休息日。可安排瑜伽或核心力量。' }, { day: '周二', tag: '🏊 有氧/技术', style: styles.swim, text: `轻松游 ${Math.round(2*mult)}k。做分解技术动作。` },
                { day: '周三', tag: '🚴 基础有氧', style: styles.bike, text: `平稳骑行 ${Math.round(1*mult)}h。严格压在 Z2。` }, { day: '周四', tag: '🏃 轻松跑', style: styles.run, text: `Z2 慢跑 ${Math.round(45*mult)}m。关注步频。` },
                { day: '周五', tag: '🏊 耐力游', style: styles.swim, text: `长游 ${Math.round(2.5*mult)}k。建立长距离耐力。` }, { day: '周六', tag: '🚴 长距离LSD', style: styles.bike, text: `周末长骑 ${Math.round(2.5*mult)}h。纯 Z2 慢骑。` }, { day: '周日', tag: '🏃 长距离LSD', style: styles.run, text: `周末长跑 ${Math.round(1*mult)}h。慢到可自由交谈。` }
            ];
        };

        const analyzeSplits = (pb, goal, goalType, pbDist, goalDist) => {
            if (goalType === 'finish') {
                if (pbDist !== goalDist) return `跨距离体验！着重挑战全新的 ${goalDist.split(' ')[0]}。目标以享受赛道、安全完赛为主。重点：1. 适应长距离补给策略；2. 坚决执行舒适心率区间，切忌前半程上头冲刺；3. 倾听身体反馈。`;
                return `本次以稳健完赛为目标。保持放松的心态，以轻松的有氧配速享受赛道，注意倾听身体的声音，避免伤病。`;
            }
            if (goalType === 'cutoff') {
                if (pbDist !== goalDist) return `跨距离抗压挑战！面临全新的 ${goalDist.split(' ')[0]} 及关门压力。建议重点：1. 熟记官方关门时间节点；2. 训练中增加长距离抗疲劳测试；3. 换项区快速通过，把每一次换项都当成生命线！`;
                return `压线生存战！面临严格的完赛时间压力。建议重点：1. 熟记各单项绝对关门时间；2. 训练加强基础耐力，提高后半程抗疲劳能力；3. 换项区切忌停留休息，按流水线迅速通过。`;
            }
            if (pbDist !== goalDist) return `跨距离成绩挑战！基于你 ${pbDist.split(' ')[0]} 的底子，设定了 ${goalDist.split(' ')[0]} 的进阶成绩目标。请结合长距离配速科学评估，赛时严控体力分配，避免掉速。`;

            const diffs = { swim: Number(pb.swim) - Number(goal.swim), t1: Number(pb.t1) - Number(goal.t1), bike: Number(pb.bike) - Number(goal.bike), t2: Number(pb.t2) - Number(goal.t2), run: Number(pb.run) - Number(goal.run) };
            const totalDiff = Object.values(diffs).reduce((a,b) => a+b, 0);
            
            if (totalDiff <= 0) return `保守/稳健目标（与该距离最好成绩持平或略慢）。重点在于无伤备赛，保持日常训练连贯性，执行稳定的赛场营养补给策略。`;

            let strategy = `要求在此前最好成绩基础上提速 ${totalDiff} 分钟！`;
            const pcts = { swim: Number(pb.swim) > 0 ? diffs.swim / Number(pb.swim) : 0, bike: Number(pb.bike) > 0 ? diffs.bike / Number(pb.bike) : 0, run: Number(pb.run) > 0 ? diffs.run / Number(pb.run) : 0 };
            const maxPct = Math.max(pcts.swim, pcts.bike, pcts.run);
            let focusAreas = [];

            if (diffs.swim > 0 && pcts.swim === maxPct) focusAreas.push("游泳提速要求最高，需增加水感训练及公开水域实战");
            else if (diffs.bike > 0 && pcts.bike === maxPct) focusAreas.push("自行车是被寄予厚望的突破口，重点强化甜点区(Sweet Spot)巡航");
            else if (diffs.run > 0 && pcts.run === maxPct) focusAreas.push("跑步是本次提速的核心，需加强砖块训练(Brick)以适应疲劳");
            
            if ((diffs.t1 + diffs.t2) >= 3) focusAreas.push(`换项区硬挤出了 ${diffs.t1 + diffs.t2} 分钟，这是最容易拿到的免费时间，赛前务必反复演练流程`);

            if (focusAreas.length > 0) strategy += ` 重点突破方向：` + focusAreas.join("；") + "。";
            return strategy;
        };

        // --- 纯 CSS 替代 Recharts 绘制的轻量级趋势图 ---
        const CustomTrendChart = ({ data }) => {
            const maxPlanned = Math.max(...data.map(d => d.planned)) || 1;
            const maxActual = Math.max(...data.map(d => d.actual)) || 1;
            const maxVal = Math.max(maxPlanned, maxActual) * 1.1; 

            return (
                <div className="flex items-end gap-2 h-40 mt-6 pt-4 border-b border-zinc-100">
                    {data.map((item, i) => {
                        const plannedHeight = `${(item.planned / maxVal) * 100}%`;
                        const actualHeight = `${(item.actual / maxVal) * 100}%`;
                        
                        return (
                            <div key={i} className="flex-1 flex flex-col justify-end items-center gap-2 group relative">
                                <div className="absolute -top-12 opacity-0 group-hover:opacity-100 transition-opacity bg-zinc-800 text-white text-[10px] py-1 px-2 rounded-lg shadow-lg pointer-events-none z-10 w-max text-center">
                                    <div className="font-bold">{item.week}</div>
                                    <div>计划: {item.planned}h | 达成: {item.actual}h</div>
                                </div>
                                <div className="w-full flex justify-center items-end gap-1 h-32 relative">
                                    <div className="w-4 bg-zinc-200 rounded-t-sm hover:bg-zinc-300 transition-colors" style={{ height: plannedHeight }} title={`计划: ${item.planned}h`}></div>
                                    <div className="w-4 bg-zinc-800 rounded-t-sm hover:bg-zinc-700 transition-colors" style={{ height: actualHeight }} title={`实际: ${item.actual}h`}></div>
                                    
                                    {i < data.length - 1 && (
                                        <div className="absolute h-full pointer-events-none z-0" style={{ top: 0, left: '50%', width: 'calc(100% + 0.5rem)' }}>
                                            <svg className="w-full h-full overflow-visible">
                                                <line 
                                                    x1="0" y1={`${100 - (item.actual / maxVal) * 100}%`} 
                                                    x2="100%" y2={`${100 - (data[i+1].actual / maxVal) * 100}%`} 
                                                    stroke="#18181b" strokeWidth="2.5"
                                                />
                                            </svg>
                                        </div>
                                    )}
                                    <div className="absolute left-1/2 w-2.5 h-2.5 rounded-full bg-white border-2 border-[#18181b] -translate-x-1/2 z-10" style={{ bottom: actualHeight, marginBottom: '-5px' }}></div>
                                </div>
                                <div className="text-[10px] text-zinc-400 font-bold uppercase tracking-wider">{item.week}</div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        // --- 主 App 组件 ---
        function App() {
            const [config, setConfig] = useState({
                ageGroup: '30-34', gender: 'M',
                plannedSwim: 180, plannedBike: 360, plannedRun: 240, plannedSwimDist: 3.5, plannedBikeDist: 100, plannedRunDist: 30,
                pbDistance: '奥运标准距离 (51.5km)', pbSplits: { swim: 40, t1: 5, bike: 80, t2: 5, run: 55 },
                goalDistance: '奥运标准距离 (51.5km)', goalType: 'time', goalSplits: { swim: 35, t1: 3, bike: 75, t2: 3, run: 50 },
                races: [{ id: Date.now(), name: '威海超级铁人三项系列赛 (中铁协)', date: '2026-09-20', distance: '奥运标准距离 (51.5km)', priority: 'A', isCustomMode: false }]
            });
            const [activeModal, setActiveModal] = useState(null); 
            const [authStatus, setAuthStatus] = useState('未连接'); 
            const [activities, setActivities] = useState({ swimTime: 0, swimDist: 0, bikeTime: 0, bikeDist: 0, runTime: 0, runDist: 0 }); 
            const [weeklyTrends, setWeeklyTrends] = useState([]); 
            const [loading, setLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');

            useEffect(() => {
                const savedConfigStr = localStorage.getItem('strava_planner_config');
                if (savedConfigStr) {
                    let savedConfig = JSON.parse(savedConfigStr);
                    if (!savedConfig.pbSplits) {
                        const totalPbMins = (Number(savedConfig.pbHours) || 3) * 60 + (Number(savedConfig.pbMinutes) || 0);
                        const totalGoalMins = (Number(savedConfig.goalHours) || 2) * 60 + (Number(savedConfig.goalMinutes) || 45);
                        savedConfig.pbSplits = { swim: Math.floor(totalPbMins * 0.2), t1: 5, bike: Math.floor(totalPbMins * 0.45), t2: 5, run: Math.floor(totalPbMins * 0.3) };
                        savedConfig.goalSplits = { swim: Math.floor(totalGoalMins * 0.2), t1: 3, bike: Math.floor(totalGoalMins * 0.45), t2: 3, run: Math.floor(totalGoalMins * 0.3) };
                    }
                    if (savedConfig.referenceDistance !== undefined) { savedConfig.pbDistance = savedConfig.referenceDistance; savedConfig.goalDistance = savedConfig.referenceDistance; }
                    if (!savedConfig.goalType) savedConfig.goalType = 'time';
                    setConfig(savedConfig);
                }

                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                if (code) { setAuthStatus('授权中'); exchangeToken(code); } 
                else { const token = localStorage.getItem('strava_access_token'); if (token) { setAuthStatus('已连接'); fetchCurrentWeekData(); } }
            }, []);

            const saveConfig = () => {
                const sortedConfig = { ...config, races: [...config.races] };
                sortedConfig.races.sort((a, b) => new Date(a.date) - new Date(b.date));
                setConfig(sortedConfig); localStorage.setItem('strava_planner_config', JSON.stringify(sortedConfig)); setActiveModal(null);
            };

            const handleGoalChange = (field, value) => setConfig({ ...config, [field]: value });
            const handleSplitChange = (type, discipline, value) => setConfig({ ...config, [type]: { ...config[type], [discipline]: value } });
            const handleGoalBlur = () => {
                const safeConfig = {
                    ...config,
                    plannedSwim: config.plannedSwim === '' ? '' : Math.max(0, Number(config.plannedSwim) || 0),
                    plannedBike: config.plannedBike === '' ? '' : Math.max(0, Number(config.plannedBike) || 0),
                    plannedRun: config.plannedRun === '' ? '' : Math.max(0, Number(config.plannedRun) || 0),
                    plannedSwimDist: config.plannedSwimDist === '' ? '' : Math.max(0, Number(config.plannedSwimDist) || 0),
                    plannedBikeDist: config.plannedBikeDist === '' ? '' : Math.max(0, Number(config.plannedBikeDist) || 0),
                    plannedRunDist: config.plannedRunDist === '' ? '' : Math.max(0, Number(config.plannedRunDist) || 0),
                };
                setConfig(safeConfig); localStorage.setItem('strava_planner_config', JSON.stringify(safeConfig));
            };

            const handleAddRace = () => setConfig({ ...config, races: [...config.races, { id: Date.now(), name: '', date: '', distance: '奥运标准距离 (51.5km)', priority: 'B', isCustomMode: false }] });
            const handleRemoveRace = (id) => setConfig({ ...config, races: config.races.filter(r => r.id !== id) });
            const handleRaceChange = (id, field, value) => {
                const newRaces = config.races.map(r => {
                    if (r.id === id) {
                        const updatedRace = { ...r, [field]: value };
                        if (field === 'name') { const predefined = PREDEFINED_RACES.find(pr => pr.name === value); if (predefined && predefined.estDate) updatedRace.date = predefined.estDate; }
                        return updatedRace;
                    }
                    return r;
                });
                setConfig({ ...config, races: newRaces });
            };

            // ⚠️ 更新 1：一键发起授权，不再需要让用户填 API！
            const initiateStravaAuth = () => {
                if (!MY_STRAVA_CLIENT_ID || MY_STRAVA_CLIENT_ID.includes('填入')) {
                    alert("开发者请注意：请在代码的 MY_STRAVA_CLIENT_ID 变量处填入你的 ID！");
                    return;
                }
                const redirectUri = window.location.origin + window.location.pathname;
                window.location.href = `https://www.strava.com/oauth/authorize?client_id=${MY_STRAVA_CLIENT_ID}&response_type=code&redirect_uri=${encodeURIComponent(redirectUri)}&approval_prompt=force&scope=activity:read_all`;
            };

            // ⚠️ 更新 2：去请求你的 Vercel 后端，不再把 Secret 暴露在前端！
            const exchangeToken = async (code) => {
                try {
                    // 调用你部署在 Vercel 上的 /api/strava-token 接口
                    const res = await fetch('/api/strava-token', {
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code: code })
                    });
                    const data = await res.json();
                    window.history.replaceState({}, document.title, window.location.pathname);
                    if (data.access_token) {
                        localStorage.setItem('strava_access_token', data.access_token); localStorage.setItem('strava_refresh_token', data.refresh_token);
                        setAuthStatus('已连接'); fetchCurrentWeekData(); setActiveModal(null);
                    } else { setAuthStatus('未连接'); setErrorMsg("授权失败，请重试。"); }
                } catch (err) { setAuthStatus('未连接'); setErrorMsg("网络错误，可能后端 API 未正确部署：" + err.message); }
            };

            const fetchCurrentWeekData = async () => {
                setLoading(true); const token = localStorage.getItem('strava_access_token');
                const now = new Date(); const dayOfWeek = now.getDay() === 0 ? 7 : now.getDay();
                const currentMonday = new Date(now); currentMonday.setDate(now.getDate() - dayOfWeek + 1); currentMonday.setHours(0, 0, 0, 0);
                
                const sixWeeksAgoMonday = new Date(currentMonday);
                sixWeeksAgoMonday.setDate(currentMonday.getDate() - 35);
                const afterTimestamp = Math.floor(sixWeeksAgoMonday.getTime() / 1000);

                try {
                    const res = await fetch(`https://www.strava.com/api/v3/athlete/activities?after=${afterTimestamp}&per_page=200`, { headers: { 'Authorization': `Bearer ${token}` } });
                    if (res.status === 401) { localStorage.removeItem('strava_access_token'); setAuthStatus('未连接'); setLoading(false); return; }
                    const data = await res.json();
                    
                    const labels = [];
                    for (let i = 5; i >= 0; i--) {
                        const d = new Date(currentMonday);
                        d.setDate(d.getDate() - i * 7);
                        if (i === 0) labels.push('本周');
                        else if (i === 1) labels.push('上周');
                        else labels.push(`${d.getMonth() + 1}/${d.getDate()}`);
                    }
                    const trends = labels.map(label => ({ week: label, actual: 0 }));
                    
                    let swimTime = 0, bikeTime = 0, runTime = 0, swimDist = 0, bikeDist = 0, runDist = 0;
                    
                    data.forEach(activity => {
                        const actDate = new Date(activity.start_date_local || activity.start_date);
                        const diffTime = actDate.getTime() - sixWeeksAgoMonday.getTime();
                        const weekIndex = Math.floor(diffTime / (1000 * 60 * 60 * 24 * 7));

                        if (weekIndex >= 0 && weekIndex <= 5) {
                            trends[weekIndex].actual += (activity.moving_time / 3600);
                        }

                        if (weekIndex === 5) {
                            const minutes = Math.round(activity.moving_time / 60); const distMeters = activity.distance;
                            if (activity.type === 'Swim') { swimTime += minutes; swimDist += distMeters; }
                            if (activity.type === 'Ride' || activity.type === 'VirtualRide') { bikeTime += minutes; bikeDist += distMeters; }
                            if (activity.type === 'Run' || activity.type === 'TrailRun') { runTime += minutes; runDist += distMeters; }
                        }
                    });

                    trends.forEach(t => t.actual = parseFloat(t.actual.toFixed(1)));
                    
                    setWeeklyTrends(trends);
                    setActivities({ swimTime, bikeTime, runTime, swimDist: parseFloat((swimDist / 1000).toFixed(1)), bikeDist: parseFloat((bikeDist / 1000).toFixed(1)), runDist: parseFloat((runDist / 1000).toFixed(1)) });
                } catch (err) { setErrorMsg("获取数据失败。"); }
                setLoading(false);
            };

            // --- 数据衍生计算 ---
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const upcomingRaces = config.races.filter(r => r.date && new Date(r.date) >= today).sort((a, b) => new Date(a.date) - new Date(b.date));
            const pastRaces = config.races.filter(r => r.date && new Date(r.date) < today).sort((a, b) => new Date(b.date) - new Date(a.date));
            let nextPrimaryRace = upcomingRaces.find(r => r.priority === 'A') || upcomingRaces[0];
            let isPast = false; let primaryDaysLeft = 0;

            if (nextPrimaryRace) { primaryDaysLeft = Math.ceil((new Date(nextPrimaryRace.date) - today) / (1000 * 60 * 60 * 24)); } 
            else if (pastRaces.length > 0) { nextPrimaryRace = pastRaces[0]; primaryDaysLeft = Math.ceil((today - new Date(nextPrimaryRace.date)) / (1000 * 60 * 60 * 24)); isPast = true; }

            const trainingAdvice = getTrainingPhaseAdvice(isPast ? -1 : primaryDaysLeft);
            const weeklyPlan = generateWeeklyPlan(trainingAdvice.id, config.goalDistance);

            const pbTotal = Object.values(config.pbSplits).reduce((a,b)=> Number(a) + Number(b), 0);
            const goalTotal = Object.values(config.goalSplits).reduce((a,b)=> Number(a) + Number(b), 0);
            const pbDistStr = config.pbDistance.split(' ')[0];
            const goalDistStr = config.goalDistance.split(' ')[0];
            
            let goalDisplay = "";
            if (config.goalType === 'finish') goalDisplay = "享受赛道 / 顺利完赛";
            else if (config.goalType === 'cutoff') goalDisplay = "压线完赛 (挑战关门)";
            else goalDisplay = formatTime(goalTotal);
            
            const goalStrategyTxt = analyzeSplits(config.pbSplits, config.goalSplits, config.goalType, config.pbDistance, config.goalDistance);

            const getProgress = (planned, actual) => planned == 0 ? 0 : Math.min(100, Math.round((actual / planned) * 100));
            const getPriorityColor = (priority) => { if (priority === 'A') return 'bg-rose-100 text-rose-700 border-rose-200'; if (priority === 'B') return 'bg-blue-100 text-blue-700 border-blue-200'; return 'bg-zinc-100 text-zinc-700 border-zinc-200'; }

            const currentPlannedHours = parseFloat(((Number(config.plannedSwim) || 0) + (Number(config.plannedBike) || 0) + (Number(config.plannedRun) || 0)) / 60).toFixed(1);
            const displayTrends = authStatus === '已连接' && weeklyTrends.length > 0
                ? weeklyTrends.map(t => ({ ...t, planned: Number(currentPlannedHours) })) 
                : MOCK_WEEKLY_TRENDS;

            return (
                <div className="min-h-screen bg-[#F4F4F5] p-4 md:p-8 font-sans text-slate-800 selection:bg-[#FC4C02] selection:text-white">

                                </div>
                                <h1 className="text-4xl font-extrabold text-zinc-900 tracking-tight flex items-center gap-3">
                                    铁三训练看板
                                    <span className="text-sm font-medium bg-zinc-200 text-zinc-600 px-3 py-1 rounded-full tracking-normal mb-1">{config.gender === 'M' ? '男子' : '女子'} {config.ageGroup}</span>
                                </h1>
                            </div>
                            
                            <div className="flex gap-3 items-center">
                                <button onClick={() => setActiveModal('calendar')} className="bg-white text-zinc-700 border border-zinc-200 px-4 py-3 rounded-2xl hover:bg-zinc-50 hover:shadow-md transition-all flex items-center gap-2 text-sm font-bold shadow-sm">

                                        className={`px-6 py-3 text-sm font-bold text-white transition flex items-center gap-2 ${authStatus === '已连接' ? 'bg-zinc-900 hover:bg-zinc-800' : 'bg-[#FC4C02] hover:bg-[#E34402]'} disabled:opacity-70`}
                                    >
                                        {loading ? <IconLoader className="h-4 w-4" /> : (authStatus === '已连接' ? <IconActivity className="h-4 w-4 text-[#FC4C02]" /> : <IconZap className="h-4 w-4" />)}
                                        {loading ? '同步中...' : (authStatus === '已连接' ? 'Strava 已连接' : '连接 Strava 授权')}
                                    </button>

                        {errorMsg && (<div className="bg-rose-50 border border-rose-200 text-rose-700 px-4 py-3 rounded-2xl shadow-sm flex items-center gap-2"><IconAlert className="h-5 w-5"/> <span className="font-medium text-sm">{errorMsg}</span></div>)}

                        {/* 第一排：倒计时 与 分析板 */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* 倒计时黑卡 */}
                            <div className="bg-zinc-900 rounded-3xl shadow-xl p-8 flex flex-col justify-between relative overflow-hidden group">
                                <div className="absolute -top-24 -right-24 w-64 h-64 bg-[#FC4C02] rounded-full mix-blend-multiply filter blur-3xl opacity-20 group-hover:opacity-30 transition-opacity duration-700"></div>
                                <div className="absolute -bottom-24 -left-24 w-64 h-64 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 group-hover:opacity-30 transition-opacity duration-700"></div>
                                
                                {/* 山峰水印元素 (呼应 Peak Planner) */}
                                <div className="absolute -bottom-8 right-0 opacity-[0.06] text-white pointer-events-none group-hover:scale-110 group-hover:opacity-[0.1] transition-all duration-1000 origin-bottom-right">
                                    <IconMountain className="w-56 h-56 md:w-64 md:h-64" />
                                </div>

                                {/* 金色发光奖杯元素 - 调小且靠上以防遮挡文字 */}
                                <div className="absolute top-6 right-6 opacity-90 text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.4)] transition-transform group-hover:scale-110 duration-500">
                                    <IconTrophy className="h-10 w-10 md:h-14 md:w-14" />
                                </div>
                                
                                {/* 增加 pr-12 防止长文字顶到右侧奖杯 */}
                                <div className="relative z-10 pr-12 md:pr-16">
                                    <div className="flex flex-wrap items-center gap-2 mb-2">
                                        <span className={`w-2 h-2 rounded-full shrink-0 ${isPast ? 'bg-zinc-500' : 'bg-yellow-400 animate-pulse shadow-[0_0_8px_rgba(250,204,21,0.8)]'}`}></span>
                                        <h2 className="text-xs font-bold text-zinc-300 uppercase tracking-widest leading-loose">
                                            {isPast ? '上一场 ' : '下一次 '} {nextPrimaryRace?.priority || 'A'}级重点赛

                                            <p className="text-sm text-zinc-400 font-medium">{nextPrimaryRace.date} • {nextPrimaryRace.distance.split(' ')[0]}</p>

                                        <h3 className="text-lg font-medium text-zinc-500 mt-2">点击上方赛历添加你的目标赛事</h3>

                                </div>
                                {nextPrimaryRace && (

                                        <span className="text-7xl font-black text-white leading-none tracking-tighter">{primaryDaysLeft}</span>
                                        <span className="text-xl text-zinc-400 font-bold mb-1.5 uppercase">{isPast ? 'Days Ago' : 'Days'}</span>
                                    </div>
                                )}
                            </div>

                            {/* AI 分析板 */}
                            <div className="lg:col-span-2 bg-white rounded-3xl shadow-sm border border-zinc-200/60 p-8 flex flex-col hover:shadow-md transition-shadow">
                                <div className="flex items-center gap-2 mb-6">
                                    <IconTarget className="h-5 w-5 text-zinc-400" />
                                    <h2 className="text-sm font-bold text-zinc-400 uppercase tracking-widest">AI 拆项战术板与备赛引擎</h2>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 flex-1">
                                    <div className="flex flex-col">
                                        <h3 className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-3">当前阶段指导 (距比赛 {primaryDaysLeft} 天)</h3>
                                        <div className={`px-4 py-2 rounded-2xl border font-bold inline-flex items-center gap-2 mb-4 text-sm w-max ${trainingAdvice.color.replace('text-','bg-').replace('800','50')} ${trainingAdvice.color} ${trainingAdvice.color.replace('text-','border-').replace('800','200')}`}>
                                            <IconActivity className="h-4 w-4" /> {trainingAdvice.phase.split('(')[0]}

                                        </div>

                                                        </div>
                                                        <div className="flex flex-col items-center">
                                                            <input type="number" value={config.goalSplits.t2} onChange={e => handleSplitChange('goalSplits', 't2', e.target.value)} className="w-full text-center border border-blue-200 bg-blue-50/50 rounded-xl py-2 text-sm font-bold text-blue-700 focus:outline-none focus:border-blue-500 transition-colors"/>
                                                        </div>
                                                        <div className="flex flex-col items-center">
                                                            <input type="number" value={config.goalSplits.run} onChange={e => handleSplitChange('goalSplits', 'run', e.target.value)} className="w-full text-center border border-blue-300 bg-white rounded-xl py-2 text-sm font-black text-blue-700 focus:outline-none focus:border-blue-500 shadow-sm transition-colors"/>
                                                        </div>
                                                    </div>
                                                )}
                                                {config.goalType === 'finish' && (
                                                    <div className="text-center text-sm font-bold text-blue-600 py-3 bg-blue-50/50 rounded-xl border border-blue-100">
                                                        以享受赛道为主，已关闭分项时间压力考核。
                                                    </div>
                                                )}
                                                {config.goalType === 'cutoff' && (
                                                    <div className="text-center text-sm font-bold text-rose-600 py-3 bg-rose-50/50 rounded-xl border border-rose-100">
                                                        挑战关门时间！重点关注各赛段硬性关门节点，切忌在换项区过多停留。
                                                    </div>
                                                )}
                                            </div>

                                            <details className="mt-4 text-sm group">
                                                <summary className="text-zinc-500 cursor-pointer font-bold hover:text-zinc-800 transition-colors flex items-center gap-1">
                                                    <IconSettings className="h-4 w-4"/> 基础资料设定 (性别/年龄组)
                                                </summary>
                                                <div className="grid grid-cols-2 gap-4 mt-4 pt-4 border-t border-zinc-200/60">
                                                    <div>
                                                        <label className="block text-xs font-bold text-zinc-600 mb-2 uppercase tracking-wider">性别组别</label>
                                                        <select value={config.gender} onChange={e => setConfig({...config, gender: e.target.value})} className="w-full border border-zinc-300 rounded-xl px-3 py-2 text-sm bg-white font-medium focus:outline-none focus:border-blue-500">
                                                            <option value="M">男子组 (Male)</option>
                                                            <option value="F">女子组 (Female)</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-zinc-600 mb-2 uppercase tracking-wider">年龄组别</label>
                                                        <select value={config.ageGroup} onChange={e => setConfig({...config, ageGroup: e.target.value})} className="w-full border border-zinc-300 rounded-xl px-3 py-2 text-sm bg-white font-medium focus:outline-none focus:border-blue-500">
                                                            {AGE_GROUPS.map(ag => <option key={ag} value={ag}>{ag}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                            </details>
                                        </div>
                                    </section>

                                    <section>
                                        <div className="flex justify-between items-center mb-4">
                                            <h4 className="font-bold text-sm text-zinc-900 uppercase tracking-widest">我的赛事日程表</h4>
                                            <button onClick={handleAddRace} className="text-xs font-bold bg-zinc-900 text-white px-4 py-2 rounded-xl hover:bg-zinc-800 transition shadow-md">+ 添加比赛</button>
                                        </div>
                                        
                                        <div className="space-y-4">
                                            {config.races.map((race, index) => {
                                                const isCustom = race.isCustomMode || (!PREDEFINED_RACES.some(pr => pr.name === race.name) && race.name !== '');
                                                return (
                                                <div key={race.id} className="bg-white border border-zinc-200/80 rounded-3xl p-5 shadow-sm relative group hover:border-zinc-300 transition-colors">
                                                    {config.races.length > 1 && (
                                                        <button onClick={() => handleRemoveRace(race.id)} className="absolute -top-3 -right-3 bg-white text-zinc-400 p-2 rounded-full border border-zinc-200 hover:bg-rose-50 hover:text-rose-600 hover:border-rose-200 transition-all shadow-sm z-10 opacity-0 group-hover:opacity-100">
                                                            <IconTrash className="h-4 w-4" />
                                                        </button>
                                                    )}
                                                    <div className="grid grid-cols-1 md:grid-cols-12 gap-4">
                                                        <div className="md:col-span-5 flex flex-col">
                                                            <label className="text-[10px] font-bold text-zinc-400 uppercase tracking-wider mb-1.5">赛事选择/名称</label>
                                                            <select 
                                                                value={isCustom ? '自定义' : race.name} 
                                                                onChange={e => {
                                                                    if (e.target.value === '自定义') { 
                                                                        const newRaces = config.races.map(r => r.id === race.id ? { ...r, name: '', isCustomMode: true } : r);
                                                                        setConfig({ ...config, races: newRaces });
                                                                    } else { 
                                                                        const predefined = PREDEFINED_RACES.find(pr => pr.name === e.target.value);
                                                                        const newRaces = config.races.map(r => r.id === race.id ? { ...r, name: e.target.value, date: predefined?.estDate || r.date, isCustomMode: false } : r);
                                                                        setConfig({ ...config, races: newRaces });
                                                                    }
                                                                }} 
                                                                className="w-full border border-zinc-300 rounded-xl px-3 py-2 text-sm font-bold text-zinc-800 mb-2 bg-zinc-50 focus:bg-white focus:border-blue-500 focus:outline-none transition-colors"
                                                            >
                                                                <option value="" disabled>请选择赛事...</option>
                                                                {PREDEFINED_RACES.filter(pr => pr.name !== "其他自定义赛事...").map(pr => (
                                                                    <option key={pr.name} value={pr.name}>{pr.name}</option>
                                                                ))}
                                                                <option value="自定义">➕ 其他自定义赛事...</option>
                                                            </select>
                                                            {isCustom && (
                                                                <input type="text" value={race.name} onChange={e => handleRaceChange(race.id, 'name', e.target.value)} className="w-full border border-blue-300 bg-blue-50 rounded-xl px-3 py-2 text-sm font-bold text-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="输入自定义赛事名称" />
                                                            )}
                                                        </div>
                                                        <div className="md:col-span-3 flex flex-col">
                                                            <label className="text-[10px] font-bold text-zinc-400 uppercase tracking-wider mb-1.5">比赛日期</label>
                                                            <input type="date" value={race.date} onChange={e => handleRaceChange(race.id, 'date', e.target.value)} className="w-full border border-zinc-300 rounded-xl px-3 py-2 text-sm font-bold text-zinc-700 bg-white focus:border-blue-500 focus:outline-none" />
                                                        </div>
                                                        <div className="md:col-span-2 flex flex-col">
                                                            <label className="text-[10px] font-bold text-zinc-400 uppercase tracking-wider mb-1.5">距离</label>
                                                            <select value={race.distance} onChange={e => handleRaceChange(race.id, 'distance', e.target.value)} className="w-full border border-zinc-300 rounded-xl px-2 py-2 text-xs font-bold text-zinc-700 bg-white focus:border-blue-500 focus:outline-none">
                                                                {DISTANCES.map(d => <option key={d} value={d}>{d}</option>)}
                                                            </select>
                                                        </div>
                                                        <div className="md:col-span-2 flex flex-col">
                                                            <label className="text-[10px] font-bold text-zinc-400 uppercase tracking-wider mb-1.5">优先级</label>
                                                            <select value={race.priority} onChange={e => handleRaceChange(race.id, 'priority', e.target.value)} className={`w-full border rounded-xl px-2 py-2 text-xs font-black focus:outline-none focus:ring-2 focus:ring-offset-1 ${race.priority==='A'?'bg-rose-50 text-rose-700 border-rose-200 focus:ring-rose-500':(race.priority==='B'?'bg-blue-50 text-blue-700 border-blue-200 focus:ring-blue-500':'bg-zinc-100 text-zinc-700 border-zinc-300 focus:ring-zinc-500')}`}>
                                                                <option value="A">A级 (重点)</option>
                                                                <option value="B">B级 (热身)</option>
                                                                <option value="C">C级 (练习)</option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                </div>
                                                );
                                            })}
                                        </div>
                                    </section>
                                </div>
                                <div className="p-6 border-t border-zinc-100 flex justify-end gap-4 bg-zinc-50 rounded-b-[2rem]">
                                    <button onClick={() => setActiveModal(null)} className="px-6 py-3 text-sm font-bold text-zinc-500 hover:text-zinc-800 hover:bg-zinc-200 rounded-xl transition-colors">取消</button>
                                    <button onClick={saveConfig} className="bg-zinc-900 hover:bg-zinc-800 text-white px-8 py-3 rounded-xl text-sm font-extrabold transition-all shadow-lg hover:shadow-xl hover:-translate-y-0.5">保存赛历与目标</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Tailwind CSS 隐藏滚动条补丁 */}
                    <style dangerouslySetInnerHTML={{__html: `
                        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
                        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #e4e4e7; border-radius: 20px; }
                        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background-color: #d4d4d8; }
                    `}} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
